name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build with version info
        run: |
          go build -ldflags "\
            -X github.com/FyrmForge/hamr/internal/cli/cmd.version=${{ github.ref_name }} \
            -X github.com/FyrmForge/hamr/internal/cli/cmd.commit=${{ github.sha }}" \
            -o bin/hamr ./cmd/hamr

      - name: Verify binary
        run: ./bin/hamr version
